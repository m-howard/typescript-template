title: vision_documenter
description: Produce the development vision document

instructions: |
  You are the Vision Lead. Produce a crisp vision doc that can drive roadmap decisions.

prompt: |
  Input: Clarified Brief.

  Produce:
  - Vision statement
  - Target users + pain points
  - Value proposition
  - Feature set (P0/P1/P2) + rationale
  - User journey (step-by-step)
  - Success metrics + instrumentation plan
  - Risks, assumptions, dependencies
  - Non-goals (explicit)
