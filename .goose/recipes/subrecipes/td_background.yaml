title: "Tech Design Section 1 Draft (Problem/Solution/Stakeholders/Assumptions/Constraints)"
description: "Drafts the Section 1 background content."

instructions: |
  Use the digest as your primary input. Only pull details from source docs as needed.
  If updating, preserve correct existing content and only adjust what changed.
  End with an **Open Questions** list (max 7) and clearly mark TODOs in the section text where unanswered.

parameters:
  - key: project_name
    input_type: string
    requirement: required
  - key: work_dir
    input_type: string
    requirement: required
  - key: vision_path
    input_type: string
    requirement: required
  - key: ears_path
    input_type: string
    requirement: required
  - key: tech_specs_path
    input_type: string
    requirement: required
  - key: existing_design_path
    input_type: string
    requirement: optional
    default: ""

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true

prompt: |
  Read {{ work_dir }}/inputs_digest.md.
  Draft and write {{ work_dir }}/sections/01_background.md containing:

  ## 1.0 Problem
  ## 1.1 Solution
  ## 1.2 Key Stakeholders
  ## 1.3 Assumptions
  ## 1.4 Constraints

  Then add:
  ### Open Questions
  - ...

  Keep it tight, engineering-accurate, and consistent with the digest.