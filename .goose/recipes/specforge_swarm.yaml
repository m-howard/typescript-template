title: specforge_swarm
description: Multi-agent swarm that turns an idea into Vision + EARS requirements spec, with human-in-the-loop stage gates for quality control.

# Optional but recommended in team setups: ensure Jira tool is available via allowlist config
# (Goose supports allowlisting extensions including Jira). :contentReference[oaicite:3]{index=3}

instructions: |
  You are the Orchestrator. You must coordinate subagents (subrecipes) to produce:
  1) Vision document
  2) EARS requirements specification

  Stage gates:
  - Do not generate Vision until the Clarifier resolves core ambiguity.
  - Do not generate EARS until Vision is approved.
  - Do not generate Architecture until EARS is approved.
  - Do not publish Jira tickets until Architecture is approved.

  Always ask targeted questions when information is missing.
  Always produce concrete, testable outputs.

prompt: |
  Execute the workflow:

  STAGE 1 — Clarify
  - Run subrecipe: clarifier_agent
  - If unresolved ambiguity remains, ask follow-up questions and re-run clarifier_agent.

  STAGE 2 — Vision
  - Run subrecipe: vision_agent with clarified brief
  - Ask for approval/changes; incorporate edits.

  STAGE 3 — EARS Requirements
  - Run subrecipe: ears_agent with approved vision + features
  - Ask for approval/changes; incorporate edits.

subrecipes:
  - name: clarifier
    path: ./clarifier.yaml

  - name: vision_documenter
    path: ./vision_documenter.yaml

  - name: ears_documenter
    path: ./ears_documenter.yaml

